<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Sanki · Analytics · Performance</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background:#f8fafc; }
    .num { font-variant-numeric: tabular-nums; }
    th.sort-btn { cursor:pointer; user-select:none; padding:10px 12px; text-align:left; font-size:11px; text-transform:uppercase; letter-spacing:0.05em; color:#64748b; background:#f8fafc; border-bottom:1px solid #e5e7eb; }
    th.sort-btn:hover { background:#eef2f7; color:#0f172a; }
    th.sort-btn .ind { color:#94a3b8; margin-left:4px; }
    th.sort-btn.active { color:#2563eb; }
    th.sort-btn.active .ind { color:#2563eb; }
    .chip { display:inline-block; padding:2px 8px; border-radius:9999px; font-size:11px; font-weight:600; }
    .chip-hot { background:#fee2e2; color:#991b1b; }
    .chip-warm { background:#fef3c7; color:#92400e; }
    .chip-cold { background:#dbeafe; color:#1e40af; }
    .chip-dead { background:#e5e7eb; color:#374151; }
    .row-link { cursor:pointer; }
    .row-link:hover { background:#f1f5f9; }
    img.thumb { width:36px; height:36px; object-fit:cover; border-radius:6px; border:1px solid #e5e7eb; background:#fff; }
    .breadcrumb { color:#64748b; font-size:14px; }
    .breadcrumb a { color:#2563eb; cursor:pointer; }
    .breadcrumb a:hover { text-decoration:underline; }
    td.cell { padding:10px 12px; border-bottom:1px solid #f1f5f9; font-size:13px; }
    .summary { background:#eff6ff; border:1px solid #bfdbfe; border-radius:8px; padding:12px 16px; margin-bottom:16px; display:flex; gap:24px; flex-wrap:wrap; font-size:13px; }
    .summary b { color:#1e3a8a; }
  </style>
</head>
<body class="text-gray-900">
  <header class="bg-white border-b">
    <div class="max-w-7xl mx-auto px-4 py-3 flex items-center justify-between flex-wrap gap-3">
      <div class="flex items-center gap-3">
        <a href="/" class="text-blue-600 font-bold no-underline">⚡ Sanki Dashboard</a>
        <span class="text-gray-400">/</span>
        <span class="font-medium">Analytics</span>
      </div>
      <div class="flex items-center gap-2 flex-wrap text-sm">
        <label class="text-gray-600">From</label>
        <input id="anaFrom" type="date" class="border rounded px-2 py-1">
        <label class="text-gray-600">To</label>
        <input id="anaTo" type="date" class="border rounded px-2 py-1">
        <label class="text-gray-600">Stockout (d)</label>
        <input id="stockoutPeriod" type="number" value="30" min="1" max="365" class="border rounded px-2 py-1 w-16 num">
        <label class="text-gray-600">Growth %</label>
        <input id="anaGrowth" type="number" value="" placeholder="auto" min="0" max="300" class="border rounded px-2 py-1 w-16 num">
        <button id="anaApply" class="bg-blue-600 hover:bg-blue-700 text-white px-3 py-1 rounded font-medium">Apply</button>
        <button id="anaRefresh" class="border border-gray-300 hover:bg-gray-50 px-3 py-1 rounded">↻</button>
      </div>
    </div>
    <div class="max-w-7xl mx-auto px-4 pb-3">
      <div class="flex gap-2 border-b text-sm">
        <button data-flow="cat" class="flow-btn px-4 py-2 -mb-px border-b-2 border-blue-600 text-blue-600 font-medium">By Category</button>
        <button data-flow="vendor" class="flow-btn px-4 py-2 -mb-px border-b-2 border-transparent text-gray-500 hover:text-gray-700">By Vendor</button>
      </div>
    </div>
  </header>

  <main class="max-w-7xl mx-auto px-4 py-6">
    <div id="breadcrumb" class="breadcrumb mb-4"></div>
    <div id="summaryBar" class="summary hidden"></div>
    <div id="contextPanel" class="mb-4 hidden"></div>
    <div id="contentArea" class="bg-white border border-gray-200 rounded-lg overflow-hidden">
      <div class="p-12 text-center text-gray-500">Loading…</div>
    </div>
    <p class="text-xs text-gray-400 mt-4">Sanki Analytics · aggregates from <code>/api/products</code>, <code>/api/orders</code>, <code>/api/collections</code></p>
  </main>

<script>
(function(){
  // ===== Settings (thresholds for tags) =====
  const DEFAULTS = {
    catTags:    { hot: 5, warm: 2, cold: 0.5 },
    vendorTags: { hot: 7, warm: 3, cold: 1 },
    growthAuto: { tier1Min: 0.5, tier1Max: 1.0, tier1Pct: 10, tier2Min: 1.0, tier2Max: 9999, tier2Pct: 20 }
  };
  function settings(){
    let s={}; try { s = JSON.parse(localStorage.getItem('sanki_settings')||'{}'); } catch(e){}
    return { ...DEFAULTS, ...s,
      catTags: { ...DEFAULTS.catTags, ...(s.catTags||{}) },
      vendorTags: { ...DEFAULTS.vendorTags, ...(s.vendorTags||{}) },
      growthAuto: { ...DEFAULTS.growthAuto, ...(s.growthAuto||{}) }
    };
  }
  function tagFor(avg, kind){
    const k = (kind === 'category') ? 'catTags' : 'vendorTags';
    const t = settings()[k];
    if (avg <= 0.5 && kind === 'cat') return 'dead';
    if (avg <= 0.5 && kind === 'vendor') return 'dead';
    if (avg >= t.hot)  return 'hot';
    if (avg >= t.warm) return 'warm';
    if (avg >= t.cold) return 'cold';
    return 'dead';
  }
  function chip(label){ return '<span class="chip chip-'+label+'">'+label.toUpperCase()+'</span>'; }
  function autoGrowth(avg){
    const g = settings().growthAuto;
    if (typeof avg !== 'number' || isNaN(avg)) return 0;
    if (avg >= g.tier2Min && avg < g.tier2Max) return g.tier2Pct;
    if (avg >= g.tier1Min && avg < g.tier1Max) return g.tier1Pct;
    return 0;
  }
  function effectiveGrowth(avg, sku){
    let m={}; try { m = JSON.parse(localStorage.getItem('sanki_sku_growth')||'{}'); } catch(e){}
    if (sku && typeof m[sku] === 'number') return m[sku];
    const g = parseFloat(document.getElementById('anaGrowth')?.value);
    if (!isNaN(g)) return g;
    return autoGrowth(avg);
  }
  // QtyToOrder formula:
  function qtyToOrder(avg, stockLeft, sku, leadDays){
    const stockoutPeriod = parseInt(document.getElementById('stockoutPeriod')?.value || '30', 10);
    const lead = (typeof leadDays === 'number' && !isNaN(leadDays)) ? leadDays : 15;
    const grw = effectiveGrowth(avg, sku);
    const need = avg * (stockoutPeriod + lead) * (1 + grw/100);
    return Math.max(0, Math.ceil(need - stockLeft));
  }

  // ===== Data loaders (cached) =====
  let _cache = { products: null, orders: null, collections: null };
  async function loadProducts(){
    if (_cache.products) return _cache.products;
    const r = await fetch('/api/products'); const j = await r.json();
    _cache.products = j.products || j || [];
    return _cache.products;
  }
  async function loadOrders(){
    if (_cache.orders) return _cache.orders;
    const r = await fetch('/api/orders?days=180'); const j = await r.json();
    _cache.orders = j.orders || j || [];
    return _cache.orders;
  }
  async function loadCollections(){
    if (_cache.collections) return _cache.collections;
    try { const r = await fetch('/api/collections'); const j = await r.json();
      _cache.collections = j.collections || j || []; }
    catch(e){ _cache.collections = []; }
    return _cache.collections;
  }
  function fromVal(){ return document.getElementById('anaFrom')?.value || ''; }
  function toVal(){ return document.getElementById('anaTo')?.value || ''; }
  function rangeDays(){
    const f = fromVal(), t = toVal();
    if (!f || !t) return 30;
    return Math.max(1, Math.round((new Date(t) - new Date(f))/86400000));
  }

  // ===== State =====
  let state = { flow: 'cat', level: 'top', context: {}, sortKey: 'revenue', sortDir: 'desc' };

  // ===== Aggregate computations =====
  // Returns { groups: [{key,title,products:Set<pid>,skus,unitsSold,revenue,avgDay,stockLeft,daysCovered,velocity,qtyToOrder,sampleImage}] }
  async function aggregate(groupBy, filter){
    const [products, orders, collections] = await Promise.all([loadProducts(), loadOrders(), loadCollections()]);
    const days = rangeDays();
    const f = fromVal(), t = toVal();
    const pById = {}, vIdToPId = {};
    products.forEach(p => { pById[p.id] = p; (p.variants||[]).forEach(v => vIdToPId[v.id] = p.id); });
    // Build pid -> categories[] map (collections)
    const pidToCats = {};
    collections.forEach(c => { (c.productIds||[]).forEach(pid => { (pidToCats[pid] = pidToCats[pid] || []).push(c.title || c.handle); }); });
    // Group products by groupBy key
    function keysFor(p){
      if (groupBy === 'category') { const pt = (p.product_type||'').trim(); return pt ? [pt] : ['(Uncategorised)']; }
      if (groupBy === 'vendor') return [(p.vendor || '(No vendor)').trim()];
      if (groupBy === 'sku') return (p.variants||[]).map(v => v.sku || ('vid:'+v.id));
      return ['all'];
    }
    // Apply filter (filter context like {category:'X'} or {vendor:'X'})
    function passesFilter(p){
      if (filter.category) { const pt = (p.product_type||'').trim() || '(Uncategorised)'; if (pt !== filter.category) return false; }
      if (filter.vendor) {
        if ((p.vendor||'').trim() !== filter.vendor) return false;
      }
      return true;
    }
    const groups = {};
    products.forEach(p => {
      if (!passesFilter(p)) return;
      keysFor(p).forEach(k => {
        const g = groups[k] = groups[k] || { key:k, title:k, products: new Set(), skus:0, unitsSold:0, revenue:0, stockLeft:0, sampleImage:'', leadDays:15, sampleVendor:p.vendor||'', skuList:[] };
        g.products.add(p.id);
        if (!g.sampleImage) { const vimg = (p.variants||[]).map(v => v.image).find(Boolean); g.sampleImage = (p.image && p.image.src) || (p.images && p.images[0] && p.images[0].src) || vimg || ''; }
        (p.variants||[]).forEach(v => {
          // For SKU groupBy, only count this variant's matching key
          if (groupBy === 'sku' && (v.sku || ('vid:'+v.id)) !== k) return;
          g.skus++;
          g.stockLeft += Number(v.inventory != null ? v.inventory : v.inventory_quantity)||0;
          g.skuList.push({ sku: v.sku, vid: v.id, pid: p.id, title: p.title, image: g.sampleImage });
        });
      });
    });
    // Aggregate sales for date range
    orders.forEach(o => {
      const d = (o.created_at||'').slice(0,10);
      if (f && d < f) return;
      if (t && d > t) return;
      (o.line_items||[]).forEach(li => {
        const pid = vIdToPId[li.variant_id]; if (!pid) return;
        const p = pById[pid]; if (!p || !passesFilter(p)) return;
        keysFor(p).forEach(k => {
          if (groupBy === 'sku') {
            const skuKey = (p.variants||[]).find(v => v.id === li.variant_id);
            const skuId = skuKey ? (skuKey.sku || ('vid:'+skuKey.id)) : null;
            if (skuId !== k) return;
          }
          const g = groups[k]; if (!g) return;
          const qty = Number(li.quantity) || 0;
          g.unitsSold += qty;
          g.revenue += (Number(li.price)||0) * qty;
        });
      });
    });
    // Compute derived
    const tagKind = (groupBy === 'category' || groupBy === 'vendor') ? groupBy : null;
    const result = Object.values(groups).map(g => {
      const avgDay = g.unitsSold / days;
      const daysCovered = avgDay > 0 ? (g.stockLeft / avgDay) : (g.stockLeft > 0 ? 9999 : 0);
      const qto = qtyToOrder(avgDay, g.stockLeft, groupBy === 'sku' ? g.key : null, 15);
      const velocity = tagKind ? tagFor(avgDay, tagKind) : null;
      return { key:g.key, title:g.title, productsCount:g.products.size, skus:g.skus,
               unitsSold:g.unitsSold, revenue:g.revenue, avgDay, stockLeft:g.stockLeft,
               daysCovered, velocity, qtyToOrder:qto, sampleImage:g.sampleImage,
               sampleVendor:g.sampleVendor, skuList:g.skuList };
    });
    return result;
  }

  // ===== Renderers =====
  function fmtInt(n){ return Math.round(n||0).toLocaleString('en-IN'); }
  function fmtDays(n){ if (!isFinite(n) || n >= 9999) return '∞'; return Math.round(n) + 'd'; }
  function fmtCurrency(n){ return '₹' + Math.round(n||0).toLocaleString('en-IN'); }
  function thBtn(label, key){
    const active = state.sortKey === key;
    const arrow = active ? (state.sortDir === 'desc' ? '↓' : '↑') : '↕';
    return '<th class="sort-btn'+(active?' active':'')+'" data-sort="'+key+'">'+label+'<span class="ind">'+arrow+'</span></th>';
  }
  function tableHTML(rows, opts){
    opts = opts || {};
    const dir = state.sortDir === 'asc' ? 1 : -1;
    rows.sort((a,b) => {
      const k = state.sortKey;
      if (typeof a[k] === 'string') return dir * String(a[k]).localeCompare(String(b[k]));
      return dir * ((a[k]||0) - (b[k]||0));
    });
    const cols = [
      thBtn(opts.titleHeader || 'Name', 'title'),
      thBtn('Products', 'productsCount'),
      thBtn('SKUs', 'skus'),
      thBtn('Units Sold', 'unitsSold'),
      thBtn('Revenue', 'revenue'),
      thBtn('Avg/Day', 'avgDay'),
      thBtn('Stock Left', 'stockLeft'),
      thBtn('Days Covered', 'daysCovered'),
      thBtn('Velocity', 'velocity'),
      thBtn('Qty to Order', 'qtyToOrder')
    ].join('');
    const rowsHTML = rows.length === 0
      ? '<tr><td colspan="10" class="cell" style="text-align:center;color:#94a3b8;padding:32px;">No data for this filter</td></tr>'
      : rows.map(r => {
          const img = r.sampleImage ? '<img class="thumb" src="'+r.sampleImage+'" loading="lazy" onerror="this.style.display=\'none\'">' : '<div style="width:36px;height:36px;background:#f1f5f9;border-radius:6px;"></div>';
          return '<tr class="row-link" data-key="'+(r.key||'').replace(/"/g,'&quot;')+'">' +
            '<td class="cell"><div style="display:flex;align-items:center;gap:10px;"><div>'+img+'</div><div><div style="font-weight:500;">'+((r.title||'').trim() || '<span style="color:#cbd5e1">(no title)</span>')+'</div>'+(opts.subtitle ? '<div style="color:#94a3b8;font-size:11px;">'+opts.subtitle(r)+'</div>' : '')+'</div></div></td>' +
            '<td class="cell num">'+fmtInt(r.productsCount)+'</td>' +
            '<td class="cell num">'+fmtInt(r.skus)+'</td>' +
            '<td class="cell num">'+fmtInt(r.unitsSold)+'</td>' +
            '<td class="cell num">'+fmtCurrency(r.revenue)+'</td>' +
            '<td class="cell num">'+(r.avgDay||0).toFixed(2)+'</td>' +
            '<td class="cell num">'+fmtInt(r.stockLeft)+'</td>' +
            '<td class="cell num">'+fmtDays(r.daysCovered)+'</td>' +
            '<td class="cell">'+(r.velocity ? chip(r.velocity) : '<span style="color:#cbd5e1;">—</span>')+'</td>' +
            '<td class="cell num"><b>'+fmtInt(r.qtyToOrder)+'</b></td>' +
          '</tr>';
        }).join('');
    return '<table class="w-full"><thead><tr>'+cols+'</tr></thead><tbody>'+rowsHTML+'</tbody></table>';
  }

  async function render(){
    const area = document.getElementById('contentArea');
    const bc = document.getElementById('breadcrumb');
    const sb = document.getElementById('summaryBar');
    area.innerHTML = '<div class="p-12 text-center text-gray-500">Loading…</div>';
    sb.classList.add('hidden');
    // Build breadcrumb
    let crumbs = [], rows;
    if (state.flow === 'cat') {
      if (state.level === 'top') { crumbs = ['<b>Categories</b>']; rows = await aggregate('category', {}); }
      else if (state.level === 'l2') { crumbs = ['<a data-up="top">Categories</a>', '<b>'+state.context.category+'</b> · Vendors']; rows = await aggregate('vendor', { category: state.context.category }); }
      else if (state.level === 'l3') { crumbs = ['<a data-up="top">Categories</a>', '<a data-up="l2">'+state.context.category+'</a>', '<b>'+state.context.vendor+'</b> · SKUs']; rows = await aggregate('sku', { category: state.context.category, vendor: state.context.vendor }); }
    } else {
      if (state.level === 'top') { crumbs = ['<b>Vendors</b>']; rows = await aggregate('vendor', {}); }
      else if (state.level === 'l2') { crumbs = ['<a data-up="top">Vendors</a>', '<b>'+state.context.vendor+'</b> · Categories']; rows = await aggregate('category', { vendor: state.context.vendor }); }
      else if (state.level === 'l3') { crumbs = ['<a data-up="top">Vendors</a>', '<a data-up="l2">'+state.context.vendor+'</a>', '<b>'+state.context.category+'</b> · SKUs']; rows = await aggregate('sku', { category: state.context.category, vendor: state.context.vendor }); }
    }
    bc.innerHTML = crumbs.join(' &rsaquo; ');
    // Summary
    const totRows = rows.length, totUnits = rows.reduce((a,r)=>a+r.unitsSold,0), totRev = rows.reduce((a,r)=>a+r.revenue,0), totStock = rows.reduce((a,r)=>a+r.stockLeft,0), totQto = rows.reduce((a,r)=>a+r.qtyToOrder,0);
    sb.innerHTML = 'Groups: <b>'+totRows+'</b>  ·  Units Sold: <b>'+fmtInt(totUnits)+'</b>  ·  Revenue: <b>'+fmtCurrency(totRev)+'</b>  ·  Stock Left: <b>'+fmtInt(totStock)+'</b>  ·  Qty to Order: <b>'+fmtInt(totQto)+'</b>';
    sb.classList.remove('hidden');
    const titleHeader = (state.level === 'top' && state.flow === 'cat') ? 'Category' :
                        (state.level === 'top' && state.flow === 'vendor') ? 'Vendor' :
                        (state.flow === 'cat' && state.level === 'l2') ? 'Vendor' :
                        (state.flow === 'vendor' && state.level === 'l2') ? 'Category' :
                        'SKU';
    area.innerHTML = tableHTML(rows, { titleHeader });
    // Wire up sort + drill
    area.querySelectorAll('th[data-sort]').forEach(th => th.addEventListener('click', () => {
      const k = th.getAttribute('data-sort');
      if (state.sortKey === k) state.sortDir = state.sortDir === 'desc' ? 'asc' : 'desc';
      else { state.sortKey = k; state.sortDir = 'desc'; }
      render();
    }));
    area.querySelectorAll('tr.row-link').forEach(tr => tr.addEventListener('click', () => {
      const key = tr.getAttribute('data-key');
      if (state.level === 'top') {
        if (state.flow === 'cat') { state.level='l2'; state.context = { category: key }; }
        else { state.level='l2'; state.context = { vendor: key }; }
        render();
      } else if (state.level === 'l2') {
        if (state.flow === 'cat') state.context.vendor = key;
        else state.context.category = key;
        state.level = 'l3'; render();
      }
      // l3 = SKU level, no further drill
    }));
    bc.querySelectorAll('a[data-up]').forEach(a => a.addEventListener('click', (e) => {
      e.preventDefault();
      const t = a.getAttribute('data-up');
      if (t === 'top') { state.level='top'; state.context={}; }
      else if (t === 'l2') { state.level='l2'; if (state.flow === 'cat') delete state.context.vendor; else delete state.context.category; }
      render();
    }));
  }

  // Boot
  function boot(){
    const today = new Date(); const monthAgo = new Date(today.getTime() - 30*86400000);
    const fmt = d => d.toISOString().slice(0,10);
    if (!document.getElementById('anaFrom').value) document.getElementById('anaFrom').value = fmt(monthAgo);
    if (!document.getElementById('anaTo').value) document.getElementById('anaTo').value = fmt(today);
    document.querySelectorAll('.flow-btn').forEach(b => b.addEventListener('click', () => {
      document.querySelectorAll('.flow-btn').forEach(x => { x.classList.remove('border-blue-600','text-blue-600'); x.classList.add('border-transparent','text-gray-500'); });
      b.classList.add('border-blue-600','text-blue-600'); b.classList.remove('border-transparent','text-gray-500');
      state.flow = b.getAttribute('data-flow'); state.level='top'; state.context={}; render();
    }));
    document.getElementById('anaApply').addEventListener('click', () => { _cache.orders = null; render(); });
    document.getElementById('anaRefresh').addEventListener('click', () => { _cache = { products:null, orders:null, collections:null }; render(); });
    document.getElementById('stockoutPeriod').addEventListener('change', render);
    document.getElementById('anaGrowth').addEventListener('change', render);
    render();
  }
  if (document.readyState === 'loading') document.addEventListener('DOMContentLoaded', boot); else boot();
})();
</script>
</body>
</html>
